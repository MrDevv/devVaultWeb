<div class="flex flex-col justify-center gap-1 overflow-x-hidden">
    <h3 class="text-[#C0C1FF] font-bold text-sm uppercase">{{ title() }}</h3>
    <span 
        class="truncate"
        [class.text-primary]="value()"
        [class.text-secondary]="!value()"
    >
        {{ value() ? value() : 'No específicado' }}
    </span>
</div>
