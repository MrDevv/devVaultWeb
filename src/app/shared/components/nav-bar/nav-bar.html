<header class="flex bg-secondary md:flex-row w-full
        justify-between p-4 text-white">
        <div routerLink="/" class="cursor-pointer flex items-center gap-3">
            <img src="logo_white.png" alt="devVault" class="w-9 z-10">
            <h1 class="text-2xl font-semibold">DevVault</h1>
        </div>

    <div class="hidden md:flex justify-center items-center gap-3 font-medium">
        <a class="pr-10 cursor-pointer" routerLink="/guide">Documentación</a>
        <a class="px-5 cursor-pointer" routerLink="/auth/login">Iniciar sesión</a>
        <a class="rounded-md bg-primary px-5 py-2 cursor-pointer" routerLink="/auth/register">Registrarse</a>
    </div> 

    <div class="md:hidden text-2xl">
        @if (isLadingPage()) {
            <i 
                (click)="navBarService.changeVale()" 
                class="fa-solid" 
                [class.fa-xmark]="navBarService.isNavBarVisible()"
                [class.fa-bars]="!navBarService.isNavBarVisible()"
                >
            </i>

        }@else {
            <i 
                (click)="sideBarService.changeValue()" 
                class="fa-solid" 
                [class.fa-xmark]="sideBarService.isSideBarVisible()"
                [class.fa-bars]="!sideBarService.isSideBarVisible()"
                >
            </i>
        }

    </div>
</header>


<div     
    [class.-top-40]="!navBarService.isNavBarVisible()"
    [class.top-15]="navBarService.isNavBarVisible()"
    class=" md:hidden -top-40 -z-10 absolute w-full
        bg-gradient text-white
        flex flex-col justify-center items-center gap-4 py-5
        duration-300"    
>   
    <a (click)="navBarService.close()" class="cursor-pointer" routerLink="/guide">Documentación</a>
    <a (click)="navBarService.close()" class="cursor-pointer" routerLink="/auth/login">Iniciar sesión</a>
    <a (click)="navBarService.close()" class="rounded-md bg-secondary px-5 py-2 cursor-pointer" routerLink="/auth/register">Registrarse</a>
</div>
