<div class="flex items-center gap-5">
    <div class="w-10 h-10 md:w-13 md:h-13 flex justify-center items-center bg-white rounded-full">
        <i class="text-2xl md:text-3xl fa-solid" [ngClass]="feature()?.icon"></i>
    </div>
    <div class="text-white max-w-64">
        <h3 class="text-[1.1rem] md:text-[1.20rem]">{{ feature()?.nombre }}</h3>
        <p class="text-[0.82rem] md:text-[16px] font-extralight">{{ feature()?.descripcion }}</p>
    </div>
</div>
