<div 
    class="p-12 rounded-xl flex flex-col justify-between bg-card h-full relative card"    
>
    <span 
        class="text-[#c0c1ff] font-bold tracking-widest text-xs uppercase mb-4"
        [class.text-green-400]="feature()?.nombre == 'Centralización'"
    >
        {{ feature()?.nombre }}
    </span>
    <h3 
        class="text-primary text-3xl font-bold mb-6 leading-tight"
    >
        {{ feature()?.descripcion }}
    </h3>
    @if (feature()?.extra) {
        <p class="text-secondary max-w-md">{{ feature()?.extra }}</p>
    }@else {
        <div class="w-full h-1 bg-primary rounded-full overflow-hidden">
            <div class="h-full bg-green-400 w-2/3"></div>
        </div>
    }
    <i class="absolute top-12 md:right-35 right-20 text-6xl w-2 h-2 opacity-10 text-secondary md:text-8xl fa-solid" [ngClass]="feature()?.icon"></i>
</div>
